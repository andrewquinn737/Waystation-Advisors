<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sellers — Deal Flow</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Deal Flow" />
<script src="js/pwa.js"></script>
</head>
<body data-page="sellers.html">
  <nav class="topnav" id="topnav"></nav>

  <main>
    <div class="page-header">
      <h1>Sellers (leads)</h1>
      <button class="btn" id="addBtn">+ Add seller lead</button>
    </div>
    <div id="errorBox" class="error-msg hidden"></div>
    <div class="toolbar">
      <input type="search" id="search" placeholder="Search sellers..." />
      <span class="count-badge" id="countBadge"></span>
    </div>
    <div id="tableWrap"></div>
  </main>

  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal">
      <h2 id="modalTitle">Seller lead</h2>
      <div id="modalError" class="error-msg hidden"></div>
      <form id="sellerForm">
        <input type="hidden" id="sellerId" />
        <label for="businessName">Business name</label>
        <input id="businessName" required />

        <div class="form-row">
          <div>
            <label for="industry">Industry</label>
            <input id="industry" />
          </div>
          <div>
            <label for="status">Status</label>
            <select id="status">
              <option value="new">New</option>
              <option value="vetted">Vetted</option>
              <option value="dead">Dead</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div>
            <label for="contactName">Contact name</label>
            <input id="contactName" />
          </div>
          <div>
            <label for="contactEmail">Contact email</label>
            <input id="contactEmail" type="email" />
          </div>
        </div>

        <label for="contactPhone">Contact phone</label>
        <input id="contactPhone" />

        <label for="notes">Notes</label>
        <textarea id="notes"></textarea>

        <div id="leadOnlyFields">
          <div class="section-title">Team lead only</div>
          <label for="askingPrice">Asking price ($)</label>
          <input id="askingPrice" type="number" step="0.01" min="0" />
          <label for="assignedTo">Assigned intern</label>
          <select id="assignedTo"></select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn" id="saveBtn">Save</button>
          <button type="button" class="btn secondary" id="cancelBtn">Cancel</button>
          <button type="button" class="btn danger hidden" id="deleteBtn" style="margin-left:auto;">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/sellers.js"></script>
</body>
</html>
