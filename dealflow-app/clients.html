<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Clients — Waystation Advisors</title>
<script>
  // Device-type detection — see the matching comment in dials.html for why
  // this replaced viewport-width media queries.
  (function () {
    var ua = navigator.userAgent || navigator.vendor || "";
    var isMobileUA = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Windows Phone|Mobile/i.test(ua);
    var isIpadOS = /Macintosh/.test(ua) && navigator.maxTouchPoints > 1;
    document.documentElement.classList.add(isMobileUA || isIpadOS ? "is-mobile-device" : "is-desktop-device");
  })();
</script>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32" />
<link rel="icon" href="favicon-16.png" type="image/png" sizes="16x16" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Waystation Advisors" />
<script src="js/pwa.js"></script>
<script src="js/noZoom.js"></script>
</head>
<body data-page="clients.html">
  <nav class="topnav" id="topnav"></nav>

  <main>
    <div class="page-header">
      <div class="page-header-left">
        <button type="button" class="page-header-toggle" id="pageMenuToggle" title="Options">
          <svg viewBox="0 0 16 16" width="10" height="10"><path d="M2 10 L8 4 L14 10 Z" fill="currentColor"/></svg>
        </button>
        <h1>Clients</h1>
      </div>
      <!-- Not wired to anything yet, per instructions — same icon/spot on
           Profile and Dials too. -->
      <button type="button" class="page-header-settings" id="pageSettingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
    <div class="page-header-menu hidden" id="pageHeaderMenu">
      <!-- Replaces the old bottom-right "+" FAB — same New-client action,
           now a regular menu item (see js/clients.js), positioned directly
           above Categories. -->
      <button type="button" class="page-header-menu-item" id="menuAddNewBtn">
        <span class="menu-item-label">New client</span>
        <span class="menu-item-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span>
      </button>
      <button type="button" class="page-header-menu-item" id="menuCategoriesBtn">
        <span class="menu-item-label">Categories</span>
        <span class="menu-item-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a1 1 0 0 1 0-10 5 5 0 0 0 0-10 10 10 0 1 0 0 20z"/><circle cx="7" cy="10" r="1"/><circle cx="10" cy="6" r="1"/><circle cx="14" cy="6" r="1"/><circle cx="17" cy="10" r="1"/></svg></span>
      </button>
    </div>
    <!-- Settings gear popover — admin-only Sellers/Buyers data-side toggle
         (see js/dealSide.js). Non-admins never get this wired up at all, so
         the gear icon stays inert for them, same as before this existed. -->
    <div class="page-header-menu hidden" id="settingsMenu">
      <button type="button" class="page-header-menu-item" id="dealSideToggleBtn">
        <span class="menu-item-label" id="dealSideLabel">Sellers</span>
        <span class="menu-item-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></span>
      </button>
      <!-- Admin-only — see the `if (isAdmin)` line near the top of
           js/clients.js. Moved here, right below Sellers/Buyers, from the
           triangle dropdown. Picking accounts here narrows down which
           clients even reach the Categories filter (see renderTable's
           combined filter). -->
      <button type="button" class="page-header-menu-item hidden" id="menuAccountsVisibleBtn">
        <span class="menu-item-label">Accounts visible</span>
        <span class="menu-item-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      </button>
    </div>
    <!-- Same fixed-position "escape the clip" submenu pattern as the Dials
         page's Categories button — see positionCategoriesSubmenu() in
         js/clients.js. Options are the 5 client pipeline statuses (see
         CLIENT_STATUSES) instead of dials' 6 contact statuses. -->
    <div class="categories-submenu hidden" id="categoriesSubmenu"></div>
    <div id="errorBox" class="error-msg hidden"></div>
    <div class="toolbar">
      <input type="search" id="search" placeholder="Search clients..." />
      <span class="count-badge" id="countBadge"></span>
    </div>
    <div id="tableWrap"></div>
  </main>

  <!-- Client create / detail full-screen view. Body content is built dynamically
       in js/clients.js since the fields shown depend on whether this is a
       brand-new client or an existing one, and on which of the Profile /
       Progress / Timeline sub-tabs is active. -->
  <div class="fullscreen-modal hidden" id="clientModal">
    <div class="fs-header">
      <div class="fs-header-main">
        <h2 id="clientModalTitle">New client</h2>
        <div class="dial-modal-subtitle hidden" id="clientModalSubtitle"></div>
      </div>
      <div class="fs-header-actions">
        <!-- Hidden except in view mode — toggled/wired in js/clients.js -->
        <button type="button" class="edit-icon-btn hidden" id="editProfileBtn" title="Edit profile">&#9998;</button>
        <button class="fs-close" id="clientModalClose">&times;</button>
      </div>
    </div>
    <div class="fs-body" id="clientModalBody"></div>
    <!-- Only shown in view mode (see renderSubtabsBar() in js/clients.js) —
         hidden entirely while creating a new client or editing an existing
         one, since Progress/Timeline don't apply to either of those. -->
    <div class="subtabs hidden" id="clientSubtabs">
      <button type="button" data-tab="profile">Profile</button>
      <button type="button" data-tab="progress">Progress</button>
      <button type="button" data-tab="timeline">Timeline</button>
    </div>
  </div>

  <!-- Admin-only "Accounts visible" popup (see menuAccountsVisibleBtn above).
       "Select all" sits above the individual account checkboxes as its own
       distinct row — checking/unchecking it snaps every account on/off at
       once; the Categories filter still applies on top of whatever's picked
       here (see renderTable's combined filter in js/clients.js). -->
  <div class="modal-backdrop hidden" id="accountsVisiblePopup">
    <div class="modal">
      <h2>Accounts visible</h2>
      <p class="help-text">Choose which accounts' clients show up in your list.</p>
      <div id="accountsVisibleBody"></div>
      <div class="form-actions">
        <button type="button" class="btn secondary" id="accountsVisibleClose">Done</button>
      </div>
    </div>
  </div>

  <!-- Schedule Intro Call popup — opened from the Timeline tab's "+" menu
       (see openTimelineIntroCall() in js/clients.js). Same shared form as the
       one on the Dials page (js/introCall.js). -->
  <div class="modal-backdrop hidden" id="introCallPopup">
    <div class="modal">
      <h2>Schedule Intro Call</h2>
      <div id="introCallPopupBody"></div>
      <div class="form-actions">
        <button type="button" class="btn secondary" id="introCallPopupClose">Close</button>
      </div>
    </div>
  </div>

  <!-- Timeline "+" details step — date (required), time (optional, 30-min
       increments), plus either a Meeting/Contract-advancement sub-type
       dropdown or a Task description field, depending on which top-level
       category was picked (see openEventDetailsModal in js/clients.js). -->
  <div class="modal-backdrop hidden" id="eventDateModal">
    <div class="modal">
      <h2 id="eventDateModalTitle">When did this happen?</h2>
      <label for="eventDateInput">Date</label>
      <input type="date" id="eventDateInput" />
      <label for="eventTimeInput">Time (optional)</label>
      <select id="eventTimeInput"></select>
      <div class="hidden" id="eventSubtypeWrap">
        <label for="eventSubtypeSelect">Type</label>
        <select id="eventSubtypeSelect"></select>
      </div>
      <div class="hidden" id="eventTaskWrap">
        <label for="eventTaskInput">Description</label>
        <input type="text" id="eventTaskInput" placeholder="What needs to be done?" />
      </div>
      <div class="form-actions">
        <button type="button" class="btn" id="eventDateConfirmBtn">Continue</button>
        <button type="button" class="btn secondary" id="eventDateCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Timeline "write a report" step — shown when the confirm-happened circle
       is pressed on an event that isn't yet checked (also reused when
       re-confirming after an uncheck, prefilled with the last-saved report —
       see openEventReportModal in js/clients.js). Confirming here both marks
       the event confirmed and saves the report text. -->
  <div class="modal-backdrop hidden" id="eventReportModal">
    <div class="modal">
      <h2>Write a report</h2>
      <label for="eventReportInput">What happened?</label>
      <textarea id="eventReportInput" rows="5"></textarea>
      <div class="form-actions">
        <button type="button" class="btn" id="eventReportConfirmBtn">Confirm</button>
        <button type="button" class="btn secondary" id="eventReportCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Timeline "edit event" popup — opened from the pencil/edit button on a
       logged event (see openEditEventModal in js/clients.js). Always lets you
       edit the date/time; the report field only shows once the event has
       actually been checked off (there's nothing to edit otherwise). Also
       hosts the Delete option that used to be a standalone "x" button. -->
  <div class="modal-backdrop hidden" id="editEventModal">
    <div class="modal">
      <h2>Edit event</h2>
      <label for="editEventDateInput">Date</label>
      <input type="date" id="editEventDateInput" />
      <label for="editEventTimeInput">Time (optional)</label>
      <select id="editEventTimeInput"></select>
      <div class="hidden" id="editEventReportWrap">
        <label for="editEventReportInput">Report</label>
        <textarea id="editEventReportInput" rows="5"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn" id="editEventSaveBtn">Save</button>
        <button type="button" class="btn danger" id="editEventDeleteBtn">Delete</button>
        <button type="button" class="btn secondary" id="editEventCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- "Who's the meeting with?" step — only shown when Meeting > Client
       meeting is picked (see openCounterpartPicker in js/clients.js). Lists
       every opposite-side ("in cahoots"/connected_to_buyer) client currently
       visible to this account, searchable, and requires picking exactly one
       row before Continue is enabled. -->
  <div class="modal-backdrop hidden" id="counterpartModal">
    <div class="modal">
      <h2>Who's the meeting with?</h2>
      <input type="search" id="counterpartSearchInput" placeholder="Search..." />
      <div id="counterpartList" class="accounts-visible-list"></div>
      <div class="form-actions">
        <button type="button" class="btn" id="counterpartConfirmBtn" disabled>Continue</button>
        <button type="button" class="btn secondary" id="counterpartCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Small centered popup summarizing missing required fields -->
  <div class="modal-backdrop hidden" id="requiredPopup">
    <div class="modal">
      <h2>Missing information</h2>
      <p id="requiredPopupText"></p>
      <div class="form-actions">
        <button type="button" class="btn" id="requiredPopupOk">OK</button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation (in-app, replacing window.confirm) -->
  <div class="modal-backdrop hidden" id="confirmDeleteModal">
    <div class="modal">
      <h2 id="confirmDeleteTitle">Delete this client?</h2>
      <p class="help-text">This cannot be undone.</p>
      <div class="form-actions">
        <button type="button" class="btn danger" id="confirmDeleteYesBtn">Delete</button>
        <button type="button" class="btn secondary" id="confirmDeleteNoBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/clients.js"></script>
</body>
</html>
