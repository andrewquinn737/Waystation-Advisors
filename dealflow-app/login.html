<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Log in — Waystation Advisors</title>
<script>
  // Device-type detection — see the matching comment in dials.html for why
  // this replaced viewport-width media queries.
  (function () {
    var ua = navigator.userAgent || navigator.vendor || "";
    var isMobileUA = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Windows Phone|Mobile/i.test(ua);
    var isIpadOS = /Macintosh/.test(ua) && navigator.maxTouchPoints > 1;
    document.documentElement.classList.add(isMobileUA || isIpadOS ? "is-mobile-device" : "is-desktop-device");
  })();
</script>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32" />
<link rel="icon" href="favicon-16.png" type="image/png" sizes="16x16" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2f5fed" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Waystation Advisors" />
<script src="js/pwa.js"></script>
<script src="js/noZoom.js"></script>
</head>
<body>
  <div class="auth-card">
    <h1>Log in</h1>
    <p class="sub">Access your team's deal pipeline.</p>

    <div id="errorBox" class="error-msg hidden"></div>

    <!-- Self-signup has been removed — only an admin can create new accounts
         now (Profile > Teams > "+" > Account, see js/profile.js). This form
         is sign-in only. -->
    <form id="authForm">
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="email" />

      <label for="password">Password</label>
      <input id="password" type="password" required autocomplete="current-password" minlength="6" />

      <div class="form-actions">
        <button type="submit" class="btn" id="submitBtn">Log in</button>
      </div>
    </form>

    <p class="help-text" style="margin-top:16px;">
      New here? Ask an admin to create your account from Profile &gt; Teams.
    </p>
  </div>

  <script type="module">
    import { supabase } from "./js/supabaseClient.js";

    const form = document.getElementById("authForm");
    const errorBox = document.getElementById("errorBox");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const submitBtn = document.getElementById("submitBtn");

    // If already signed in, skip straight to the app.
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "profile.html";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.classList.add("hidden");
      submitBtn.disabled = true;

      try {
        const { error } = await supabase.auth.signInWithPassword({
          email: email.value.trim(),
          password: password.value,
        });
        if (error) throw error;
        window.location.href = "profile.html";
      } catch (err) {
        errorBox.classList.remove("hidden");
        errorBox.style.background = "#fdecec";
        errorBox.style.color = "#d1453b";
        errorBox.textContent = err.message || String(err);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
