<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Buyers — Deal Flow</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2f5fed" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Deal Flow" />
<script src="js/pwa.js"></script>
</head>
<body data-page="buyers.html">
  <nav class="topnav" id="topnav"></nav>

  <main>
    <div class="page-header">
      <h1>Buyers</h1>
      <button class="btn hidden" id="addBtn">+ Add buyer</button>
    </div>
    <div id="errorBox" class="error-msg hidden"></div>
    <div class="toolbar">
      <input type="search" id="search" placeholder="Search buyers..." />
      <span class="count-badge" id="countBadge"></span>
    </div>
    <div id="tableWrap"></div>
  </main>

  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal">
      <h2 id="modalTitle">Buyer</h2>
      <div id="modalError" class="error-msg hidden"></div>
      <form id="buyerForm">
        <input type="hidden" id="buyerId" />
        <label for="companyName">Company name</label>
        <input id="companyName" required />

        <div class="form-row">
          <div>
            <label for="contactName">Contact name</label>
            <input id="contactName" />
          </div>
          <div>
            <label for="contactEmail">Contact email</label>
            <input id="contactEmail" type="email" />
          </div>
        </div>

        <label for="contactPhone">Contact phone</label>
        <input id="contactPhone" />

        <label for="notes">Notes</label>
        <textarea id="notes"></textarea>

        <div id="leadOnlyFields">
          <div class="section-title">Team lead only</div>
          <div class="form-row">
            <div>
              <label for="subscriptionStatus">Subscription status</label>
              <select id="subscriptionStatus">
                <option value="active">Active</option>
                <option value="paused">Paused</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div>
              <label for="monthlyFee">Monthly fee ($)</label>
              <input id="monthlyFee" type="number" step="0.01" min="0" />
            </div>
          </div>
          <label for="assignedTo">Assigned intern</label>
          <select id="assignedTo"></select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn" id="saveBtn">Save</button>
          <button type="button" class="btn secondary" id="cancelBtn">Cancel</button>
          <button type="button" class="btn danger hidden" id="deleteBtn" style="margin-left:auto;">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/buyers.js"></script>
</body>
</html>
