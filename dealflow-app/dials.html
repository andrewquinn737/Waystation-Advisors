<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Dials — Waystation Advisors</title>
<script>
  // Device-type detection, run synchronously before css/style.css is parsed
  // so there's no flash of the wrong layout. Sets html.is-mobile-device or
  // html.is-desktop-device based on the actual device, not the current
  // window/viewport size — see the big comment in css/style.css above the
  // "RESPONSIVE / MOBILE LAYOUT" section for why this replaced max-width
  // media queries (rotating a phone no longer switches it to desktop layout).
  (function () {
    var ua = navigator.userAgent || navigator.vendor || "";
    var isMobileUA = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Windows Phone|Mobile/i.test(ua);
    // iPadOS 13+ Safari reports its UA as "Macintosh" by default, so also
    // treat a touch-capable "Mac" as mobile.
    var isIpadOS = /Macintosh/.test(ua) && navigator.maxTouchPoints > 1;
    document.documentElement.classList.add(isMobileUA || isIpadOS ? "is-mobile-device" : "is-desktop-device");
  })();
</script>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32" />
<link rel="icon" href="favicon-16.png" type="image/png" sizes="16x16" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2f5fed" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Waystation Advisors" />
<script src="js/pwa.js"></script>
<script src="js/noZoom.js"></script>
</head>
<body data-page="dials.html">
  <nav class="topnav" id="topnav"></nav>

  <main>
    <div class="page-header">
      <div class="page-header-left">
        <button type="button" class="page-header-toggle" id="pageMenuToggle" title="Options">
          <svg viewBox="0 0 16 16" width="10" height="10"><path d="M2 10 L8 4 L14 10 Z" fill="currentColor"/></svg>
        </button>
        <h1>Dials</h1>
        <span class="dials-prospect-count" id="dialsProspectCount"></span>
      </div>
      <!-- Not wired to anything yet, per instructions — same icon/spot on
           Profile and Clients too. -->
      <button type="button" class="page-header-settings" id="pageSettingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <!-- Options revealed by the triangle above. Replaces the old
         Current/Archived switch, "+" FAB, and status-filter palette button —
         same functions, now text-only menu items (see js/dials.js). -->
    <div class="page-header-menu hidden" id="pageHeaderMenu">
      <button type="button" class="page-header-menu-item" id="menuAddNewBtn">Add new</button>
      <button type="button" class="page-header-menu-item" id="menuSelectBtn">Select</button>
      <button type="button" class="page-header-menu-item" id="menuStatusBtn" data-status="current">Current</button>
      <button type="button" class="page-header-menu-item" id="menuCategoriesBtn">Categories</button>
    </div>
    <div class="categories-submenu hidden" id="categoriesSubmenu"></div>

    <div id="errorBox" class="error-msg hidden"></div>

    <div class="dials-tabbar">
      <div class="dials-tabs" id="dialTabs"></div>
    </div>

    <!-- Mobile-only: the "tap the already-selected tab" Archive/Unarchive
         popup. Rendered as position:fixed and positioned via JS (see
         js/dials.js) rather than nested inside .dials-tabbar, since that bar
         scrolls horizontally (overflow-x:auto), which — per the CSS spec —
         forces its overflow-y to auto too and would clip a popup nested
         inside it. -->
    <div class="dial-tab-archive-menu hidden" id="dialTabArchiveMenu">
      <button type="button" class="dial-tab-archive-btn" id="dialTabArchiveBtn"></button>
      <button type="button" class="dial-tab-delete-btn" id="dialTabDeleteBtn">Delete</button>
    </div>

    <div id="dialsTableWrap"></div>
  </main>

  <!-- Delete-this-tab confirmation -->
  <div class="modal-backdrop hidden" id="confirmDeleteTabModal">
    <div class="modal">
      <h2>Delete this list?</h2>
      <p class="help-text">This will permanently delete the list and every dial in it. This cannot be undone.</p>
      <div class="form-actions">
        <button type="button" class="btn danger" id="confirmDeleteTabYesBtn">Delete</button>
        <button type="button" class="btn secondary" id="confirmDeleteTabNoBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Dial detail / create popup. The header (title/subtitle/create-client/
       edit buttons) is fully rebuilt by js/dials.js on every render since it
       depends on which dial + mode is active, so it's just an empty mount
       point here. -->
  <div class="modal-backdrop hidden" id="dialModalBackdrop">
    <div class="dial-modal-stack">
      <div class="modal dial-modal">
        <div id="dialModalHeader"></div>
        <div id="dialModalError" class="error-msg hidden"></div>
        <div id="dialModalBody"></div>
        <div class="form-actions" id="dialModalActions"></div>
        <div class="dial-nav-row hidden" id="dialNavRow">
          <button type="button" class="btn secondary dial-nav-btn" id="dialPrevBtn">&#8249; Previous</button>
          <button type="button" class="btn secondary dial-nav-btn" id="dialNextBtn">Next &#8250;</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="requiredPopup">
    <div class="modal">
      <h2>Missing information</h2>
      <p id="requiredPopupText"></p>
      <div class="form-actions">
        <button type="button" class="btn" id="requiredPopupOk">OK</button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation (in-app, replacing window.confirm) -->
  <div class="modal-backdrop hidden" id="confirmDeleteModal">
    <div class="modal">
      <h2>Delete this dial?</h2>
      <p class="help-text">This cannot be undone.</p>
      <div class="form-actions">
        <button type="button" class="btn danger" id="confirmDeleteYesBtn">Delete</button>
        <button type="button" class="btn secondary" id="confirmDeleteNoBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- New-list dialog (in-app, replacing window.prompt) -->
  <div class="modal-backdrop hidden" id="newListModal">
    <div class="modal">
      <h2>New list</h2>
      <div id="newListError" class="error-msg hidden"></div>
      <label for="newListNameInput">List name</label>
      <input id="newListNameInput" placeholder="e.g. Q3 outreach" />
      <div class="form-actions">
        <button type="button" class="btn" id="newListCreateBtn">Create</button>
        <button type="button" class="btn secondary" id="newListCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Intro Call scheduling popup, shown after a client is created here -->
  <div class="modal-backdrop hidden" id="introCallPopup">
    <div class="modal">
      <h2>Schedule Intro Call</h2>
      <div id="introCallPopupBody"></div>
      <div class="form-actions">
        <button type="button" class="btn secondary" id="introCallPopupClose">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/dials.js"></script>
</body>
</html>
