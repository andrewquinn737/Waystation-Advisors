<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deals — Deal Flow</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Deal Flow" />
<script src="js/pwa.js"></script>
</head>
<body data-page="deals.html">
  <nav class="topnav" id="topnav"></nav>

  <main>
    <div class="page-header">
      <h1>Deals</h1>
      <button class="btn" id="addBtn">+ New deal</button>
    </div>
    <div id="errorBox" class="error-msg hidden"></div>
    <div class="toolbar">
      <select id="statusFilter">
        <option value="">All statuses</option>
        <option value="pitched">Pitched</option>
        <option value="interested">Interested</option>
        <option value="negotiating">Negotiating</option>
        <option value="closed_won">Closed won</option>
        <option value="closed_lost">Closed lost</option>
      </select>
      <span class="count-badge" id="countBadge"></span>
    </div>
    <div id="tableWrap"></div>
  </main>

  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal">
      <h2 id="modalTitle">Deal</h2>
      <div id="modalError" class="error-msg hidden"></div>
      <form id="dealForm">
        <input type="hidden" id="dealId" />

        <label for="sellerSelect">Seller lead</label>
        <select id="sellerSelect" required></select>

        <label for="buyerSelect">Buyer</label>
        <select id="buyerSelect" required></select>

        <label for="status">Status</label>
        <select id="status">
          <option value="pitched">Pitched</option>
          <option value="interested">Interested</option>
          <option value="negotiating">Negotiating</option>
          <option value="closed_won" id="closedWonOpt">Closed won</option>
          <option value="closed_lost" id="closedLostOpt">Closed lost</option>
        </select>

        <div id="closingFields" class="hidden">
          <div class="section-title">Team lead only — closing terms</div>
          <div class="form-row">
            <div>
              <label for="salePrice">Sale price ($)</label>
              <input id="salePrice" type="number" step="0.01" min="0" />
            </div>
            <div>
              <label for="commissionRate">Commission rate (%)</label>
              <input id="commissionRate" type="number" step="0.1" min="0" max="100" />
            </div>
          </div>
          <p class="help-text">Closing a deal here automatically creates a commission record on the Finance page.</p>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn" id="saveBtn">Save</button>
          <button type="button" class="btn secondary" id="cancelBtn">Cancel</button>
          <button type="button" class="btn danger hidden" id="deleteBtn" style="margin-left:auto;">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/deals.js"></script>
</body>
</html>
